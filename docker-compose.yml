# docker-compose.yml
# Use this to run the edge node locally for testing

version: "3.8"

services:
  edge-node:
    build: .
    container_name: edge-sensor-node
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
